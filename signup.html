<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Signup</title>
</head>
<body class="signupBack">
    <header id="page_header">
        <div>
            <div><img src="img/logo.jpeg" alt="Sweet Scoop Ice Cream Logo"></div>
        </div>
        <div>
            <h3>Sweet Scoop Ice Cream</h3>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <main class="signup_main">
        <div id="signup_container">
            <h2>Sign Up</h2>
            <form id="signupForm" autocomplete="off" novalidate>
                <label for="username">Username</label><br>
                <input type="text" id="username" name="username" required><br><br>

                <label for="password">Password</label><br>
                <input type="password" id="password" name="password" required><br><br>

                <label for="confirmPassword">Confirm Password</label><br>
                <input type="password" id="confirmPassword" name="confirmPassword" required><br><br>

                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <button type="submit" class="btn-signup">Sign Up</button>
                <br /><br />
                <label for="loginbutton">Already have an account?</label>
                <button id="loginbutton" onclick="window.location.href='login.html'; return false;">Login</button>
            </form>
            <div id="messageBox" class="message-box"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sweet Scoop Ice Cream.</p>
    </footer>
    <script>
        // Validation regexes
        const usernameRegex = /^[A-Za-z][A-Za-z0-9_-]{2,19}$/;
        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()\-_=+\[\]{}|;:'",.<>?/`~])[A-Za-z\d!@#$%^&*()\-_=+\[\]{}|;:'",.<>?/`~]{8,}$/;
        const emailRegex = /^[^\s@]+@[^\s@]+\.(com|net|io)$/i;

        function showMessage(messages, type) {
            const box = document.getElementById('messageBox');
            box.className = 'message-box ' + (type === 'error' ? 'error-box' : 'success-box');
            box.innerHTML = Array.isArray(messages) ? messages.join('<br>') : messages;
            box.style.display = 'block';
            type === 'error' ? box.className = 'error' : box.className = 'success';
        }

        function hideMessage() {
            const box = document.getElementById('messageBox');
            box.style.display = 'none';
        }

        document.getElementById('signupForm').addEventListener('submit', function (e) {
            e.preventDefault();
            hideMessage();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value.trim();

            let errors = [];

            // Username validation
            if (!usernameRegex.test(username)) {
                errors.push("Username must be 3-20 characters, start with a letter, and only contain letters, numbers, hyphens, or underscores.");
            }
            if (/\s/.test(username)) {
                errors.push("Username cannot contain spaces.");
            }

            // Password validation
            if (!passwordRegex.test(password)) {
                errors.push("Password must be at least 8 characters, include uppercase, lowercase, number, and allowed special character.");
            }
            if (/\s/.test(password)) {
                errors.push("Password cannot contain spaces.");
            }

            // Confirm password
            if (password !== confirmPassword) {
                errors.push("Confirm Password must match Password.");
            }

            // Email validation
            if (!emailRegex.test(email)) {
                errors.push("Email must be valid and end with .com, .net, or .io.");
            }
            if (/\s/.test(email)) {
                errors.push("Email cannot contain spaces.");
            }

            if (errors.length > 0) {
                showMessage(errors, 'error');
                return;
            }

            // Success
            showMessage("Signup successful! Redirecting to Login page...", 'success');
            setTimeout(function () {
                window.location.href = "login.html";
            }, 1500);
        });
    </script>
</body>
</html>
