<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>

<body>
    <header id="page_header">
        <div>
            <div><img src="img/logo.jpeg" alt="Sweet Scoop Ice Cream Logo"></div>
        </div>

        <div>
            <h3>Sweet Scoop Ice Cream</h3>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <main class="login_main">
        <div id="login_container">
            <h2>Welcome Back!</h2>
            <p>Please enter your username to log in.</p>
            <form id="login_form">
                <label for="username">Username</label><br>
                <input type="text" id="username" name="username" required><br><br>

                <label for="password">Password (Email)</label><br>
                <input type="password" id="password" name="password" required><br><br>

                <div>
                    <input type="checkbox" id="forgot_password" name="forgot_password" disabled>
                    <label for="forgot_password">Forgot Password?</label><br><br>
                </div>

                <button id="loginbutton">Login</button>

                <br />
                <br />
                <label for="signupbutton">New user?</label>
                <button id="signupbutton" onclick="window.location.href='signup.html'">Create an account</button>

            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sweet Scoop Ice Cream.</p>
    </footer>
</body>

<script>

    const loginbutton = document.getElementById('loginbutton');

    async function fetchData() {
        try {
            const response = await fetch('https://jsonplaceholder.typicode.com/users');
            const data = await response.json();
            return data;
        } catch (e) {
            console.error("Error fetching data: ", e.message);
        }
    }

    async function login(event) {
        event.preventDefault();
        const usernameInput = document.getElementById('username').value;
        const passwordInput = document.getElementById('password').value;

        const users = await fetchData();
        console.log(users);

        const user = users.find(u => u.username.toLowerCase() === usernameInput.toLowerCase() && u.email === passwordInput);
        if (user) {
            document.getElementById('login_container').innerHTML = `
            <h2>Welcome, ${user.name}!</h2>
            <p>Redirecting to the menu...</p>
            `;
            setTimeout(() => {
                window.location.href = "menu_view.html";
            }, 2000);
        } else {
            document.getElementById('login_container').innerHTML = `
            <h2>Invalid username or password.</h2>
            `;
        }
    }

    loginbutton.addEventListener('click', login);
</script>
</html>
